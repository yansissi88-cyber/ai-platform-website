name: 🔄 Update Website Data & Deploy

on:
  # 每30分钟检查一次（更频繁的更新）
  schedule:
    - cron: '*/30 * * * *'
  
  # Release 发布时触发
  repository_dispatch:
    types: [release-published]
  
  # 手动触发
  workflow_dispatch:

# 权限配置
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "update-website"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    # ========== 同步 GitHub 数据 ==========
    - name: Sync GitHub Data
      env:
        GITHUB_OWNER: keyreply
        GITHUB_REPO: kira-cloudflare
        GITHUB_TOKEN: ${{ secrets.KIRA_CLOUDFLARE_TOKEN }}
      run: |
        echo "📊 Starting GitHub data sync..."
        node scripts/sync-all-data.js
        echo "✅ Data sync complete"
    
    # ========== 验证数据更新 ==========
    - name: Verify Data Update
      run: |
        echo "📋 Verifying data files..."
        ls -lh data/
        echo ""
        echo "📊 Timeline events count:"
        cat data/timeline-data.json | grep -c '"version"' || echo "0"
        echo ""
        echo "🗺️ Roadmap items count:"
        cat data/roadmap-data.json | grep -c '"id"' || echo "0"
    
    # ========== 检查变更 ==========
    - name: Check for changes
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain data/)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "📝 Data changes detected"
          git diff --stat data/
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "✓ Data is up to date"
        fi
    
    # ========== 提交变更 ==========
    - name: Commit and push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add data/
        
        # 获取最新版本号用于提交信息
        LATEST_VERSION=$(cat data/timeline-data.json | grep '"version"' | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
        
        git commit -m "🔄 Auto update: Sync data to ${LATEST_VERSION}

        - Sync timeline from GitHub Releases
        - Update roadmap from GitHub Issues/Milestones  
        - $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
        
        git push || echo "Nothing to push"
    
    # ========== 部署到 GitHub Pages ==========
    - name: Deploy to GitHub Pages
      if: steps.check_changes.outputs.has_changes == 'true'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        exclude_assets: 'node_modules,scripts,.github'
        
    - name: Deployment complete
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        echo "🚀 Website deployed successfully!"
        echo "🔗 https://yansissi88-cyber.github.io/ai-platform-website/"
