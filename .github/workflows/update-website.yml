name: 🔄 Update Website Data & Deploy

on:
  # 每小时检查一次
  schedule:
    - cron: '0 * * * *'
  
  # Release 发布时触发
  repository_dispatch:
    types: [release-published]
  
  # 手动触发
  workflow_dispatch:

# 权限配置
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "update-website"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm install -g playwright
        npx playwright install chromium
    
    # ========== 同步 GitHub 数据 ==========
    - name: Sync GitHub Data
      env:
        GITHUB_OWNER: ${{ github.repository_owner }}
        GITHUB_REPO: kira-cloudflare
        GITHUB_TOKEN: ${{ secrets.KIRA_CLOUDFLARE_TOKEN || secrets.GITHUB_TOKEN }}
      run: |
        echo "📊 开始同步 GitHub 数据..."
        node scripts/sync-all-data.js
        echo "✅ 数据同步完成"
    
    # ========== 捕获新功能截图 ==========
    - name: Capture Feature Screenshots
      env:
        TARGET_URL: https://kira.keyreply.com
      run: |
        echo "📸 检查是否需要捕获新截图..."
        # 这里可以添加截图逻辑，如果需要的话
        # node scripts/capture-screenshots.js
        echo "✅ 截图检查完成"
    
    # ========== 检查变更 ==========
    - name: Check for changes
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain data/ github-sync/)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "📝 检测到数据变更"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "✓ 数据已是最新"
        fi
    
    # ========== 提交变更 ==========
    - name: Commit and push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add data/
        git add github-sync/
        
        git commit -m "🔄 Auto update: Sync website data

        - Update timeline from GitHub Releases
        - Update roadmap from GitHub Issues/Milestones  
        - Sync user stories
        - $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
        
        git push || echo "Nothing to push"
    
    # ========== 部署到 GitHub Pages ==========
    - name: Deploy to GitHub Pages
      if: steps.check_changes.outputs.has_changes == 'true'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        exclude_assets: 'node_modules,scripts,.github'
        
    - name: Deployment complete
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        echo "🚀 网站已成功部署！"
        echo "🔗 访问地址: https://yansissi88-cyber.github.io/ai-platform-website/"
