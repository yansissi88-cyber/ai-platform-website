<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f172a; }
    .container { position: relative; width: 1920px; height: 1080px; }
    .bg { width: 100%; height: 100%; object-fit: cover; }
    .overlay { 
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
      background: linear-gradient(135deg, rgba(15,23,42,0.3) 0%, rgba(15,23,42,0.1) 100%);
      display: flex; justify-content: center; align-items: center;
    }
    .play-btn {
      width: 120px; height: 120px;
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      box-shadow: 0 20px 60px rgba(59,130,246,0.5), 0 0 0 8px rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.3s;
    }
    .play-btn:hover { transform: scale(1.1); }
    .play-icon {
      width: 0; height: 0;
      border-left: 35px solid white;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      margin-left: 8px;
    }
    .label {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white; padding: 12px 28px;
      border-radius: 30px; font-family: -apple-system, sans-serif;
      font-size: 18px; font-weight: 500;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="bg" src="images/new_dashboard.png">
    <div class="overlay">
      <div class="play-btn">
        <div class="play-icon"></div>
      </div>
    </div>
    <div class="label">▶ Watch Demo (0:34)</div>
  </div>
  <script>
    // Auto capture canvas and save
    setTimeout(() => {
      html2canvas = null; // placeholder
      console.log('Poster preview ready');
    }, 500);
  </script>
</body>
</html>
