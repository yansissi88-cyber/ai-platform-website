          </svg>
          GitHub

      </div>
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>

    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Overview</a>
    <a href="timeline.html">Timeline</a>
    <a href="roadmap.html">Roadmap</a>
    <a href="user-stories.html">Stories</a>
  </div>

  <!-- Roadmap Header -->
  <header class="roadmap-header">
    <h1>Product Roadmap</h1>
    <p class="subtitle">See what's coming next. Track progress, explore specifications, and help shape our future.</p>
    <div class="header-meta">
      <span id="current-quarter">Q1 2026</span>
      <span class="separator">|</span>
      <span id="last-updated"></span>
    </div>
  </header>

  <!-- View Switcher -->
  <div class="view-switcher">
    <button class="view-btn active" data-view="list">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"></line>
        <line x1="8" y1="12" x2="21" y2="12"></line>
        <line x1="8" y1="18" x2="21" y2="18"></line>
        <line x1="3" y1="6" x2="3.01" y2="6"></line>
        <line x1="3" y1="12" x2="3.01" y2="12"></line>
        <line x1="3" y1="18" x2="3.01" y2="18"></line>
      </svg>
      List View
    </button>
    <button class="view-btn" data-view="board">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      Board View
    </button>
    <button class="view-btn" data-view="quarter">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      Quarter View
    </button>
  </div>

  <!-- Filters -->
  <div class="roadmap-filters">
    <button class="filter-btn active" data-filter="all">All Items</button>
    <button class="filter-btn" data-filter="planning">Planning</button>
    <button class="filter-btn" data-filter="in_progress">In Progress</button>
    <button class="filter-btn" data-filter="testing">Testing</button>
    <button class="filter-btn" data-filter="ready">Ready</button>
  </div>

  <!-- Roadmap Content -->
  <div id="roadmap-content">
    <!-- Content will be rendered here -->
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="https://keyreply.com">KeyReply</a>
        <a href="https://docs.kira.keyreply.com">Documentation</a>
        <a href="https://github.com/keyreply/kira-cloudflare">GitHub</a>
      </div>
      <p class="footer-copyright">© 2026 KeyReply. Built with Kira on Cloudflare.</p>
    </div>
  </footer>

  <script src="assets/js/roadmap.js"></script>
  <script>
    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('active');
    }
  </script>
