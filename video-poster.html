<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background: #0a0f1d;
    }
    .poster {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: url('images/new_dashboard.png') center/cover;
      overflow: hidden;
    }
    .gradient-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, 
        rgba(11,19,43,0.4) 0%, 
        rgba(11,19,43,0.1) 50%,
        rgba(11,19,43,0.3) 100%);
    }
    .center-content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .play-btn {
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 
        0 20px 60px rgba(59,130,246,0.5),
        0 0 0 10px rgba(255,255,255,0.1),
        inset 0 2px 4px rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .play-btn:hover {
      transform: scale(1.05);
      box-shadow: 
        0 25px 70px rgba(59,130,246,0.6),
        0 0 0 12px rgba(255,255,255,0.15),
        inset 0 2px 4px rgba(255,255,255,0.3);
    }
    .play-icon {
      width: 0;
      height: 0;
      border-left: 45px solid white;
      border-top: 28px solid transparent;
      border-bottom: 28px solid transparent;
      margin-left: 12px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    .video-label {
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 14px 32px;
      border-radius: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .video-label::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.2); }
    }
    .corner-badge {
      position: absolute;
      top: 24px;
      right: 24px;
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(59,130,246,0.4);
    }
  </style>
</head>
<body>
  <div class="poster" id="poster">
    <div class="gradient-overlay"></div>
    <div class="corner-badge">Kira Demo</div>
    <div class="center-content">
      <div class="play-btn">
        <div class="play-icon"></div>
      </div>
      <div class="video-label">Watch Demo — 0:34</div>
    </div>
  </div>
</body>
</html>
